<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siva — Digispark</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #0c0c0e;
    --dark2: #131318;
    --dark3: #1c1c24;
    --text: #e8e8ec;
    --muted: rgba(232,232,236,0.45);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  /* ── Animated background ── */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .bg::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
    top: -200px; left: -100px;
    animation: drift1 12s ease-in-out infinite alternate;
  }
  .bg::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    animation: drift2 15s ease-in-out infinite alternate;
  }
  @keyframes drift1 { to { transform: translate(80px, 60px); } }
  @keyframes drift2 { to { transform: translate(-60px, -80px); } }

  /* ── Grid lines texture ── */
  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* ── Page wrapper ── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 60px;
  }

  /* ── Card ── */
  .card {
    width: 100%;
    max-width: 400px;
    background: linear-gradient(160deg, #18181f 0%, #1e1e28 60%, #131318 100%);
    border-radius: 28px;
    border: 1px solid rgba(201,168,76,0.2);
    box-shadow:
      0 0 0 1px rgba(201,168,76,0.07),
      0 40px 100px rgba(0,0,0,0.8),
      0 0 60px rgba(201,168,76,0.05);
    overflow: hidden;
    animation: riseIn 1s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(50px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Header band ── */
  .card-header {
    position: relative;
    padding: 36px 32px 28px;
    background: linear-gradient(135deg, #1e1e28, #111116);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    overflow: hidden;
  }
  .card-header::before {
    content: 'S';
    position: absolute;
    right: 24px; top: -10px;
    font-family: 'Playfair Display', serif;
    font-size: 130px;
    font-weight: 900;
    color: rgba(201,168,76,0.05);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }
  /* Gold top stripe */
  .card-header::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, var(--gold) 30%, var(--gold-light) 50%, var(--gold) 70%, transparent 100%);
  }

  .avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), #8a5e10);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 18px;
    box-shadow: 0 0 0 3px rgba(201,168,76,0.2), 0 8px 24px rgba(201,168,76,0.15);
    animation: riseIn 1s 0.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.5px;
    line-height: 1.05;
    animation: riseIn 1s 0.3s cubic-bezier(0.22,1,0.36,1) both;
  }

  .role-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    animation: riseIn 1s 0.4s cubic-bezier(0.22,1,0.36,1) both;
  }
  .badge {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--dark);
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    padding: 3px 10px;
    border-radius: 20px;
  }
  .badge.outline {
    background: transparent;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.4);
  }

  .company-name {
    margin-top: 14px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.8;
    animation: riseIn 1s 0.45s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent);
    margin: 0 32px;
  }

  /* ── Contact section ── */
  .card-body {
    padding: 24px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.6;
    margin-bottom: 4px;
  }

  .contact-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: inherit;
    padding: 12px 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    animation: riseIn 1s cubic-bezier(0.22,1,0.36,1) both;
  }
  .contact-item:nth-child(1) { animation-delay: 0.5s; }
  .contact-item:nth-child(2) { animation-delay: 0.6s; }
  .contact-item:nth-child(3) { animation-delay: 0.7s; }
  .contact-item:hover {
    background: rgba(201,168,76,0.07);
    border-color: rgba(201,168,76,0.25);
    transform: translateX(4px);
  }

  .icon-wrap {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .icon-wrap svg {
    width: 17px; height: 17px;
    stroke: var(--gold);
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .contact-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .contact-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .contact-value {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
  }

  /* ── Save contact CTA ── */
  .cta {
    margin-top: 8px;
    display: flex;
    justify-content: center;
    animation: riseIn 1s 0.85s cubic-bezier(0.22,1,0.36,1) both;
  }
  .cta-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 8px 30px rgba(201,168,76,0.3);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 40px rgba(201,168,76,0.4);
  }
  .cta-btn svg {
    width: 16px; height: 16px;
    stroke: var(--dark);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── Footer ── */
  .card-footer {
    padding: 16px 32px;
    border-top: 1px solid rgba(201,168,76,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .footer-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.4;
  }
  .footer-text {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid-overlay"></div>

<div class="page">
  <div class="card">

    <!-- Header -->
    <div class="card-header">
      <div class="avatar">S</div>
      <div class="name">Siva</div>
      <div class="role-row">
        <span class="badge">CEO</span>
        <span class="badge outline">Founder</span>
      </div>
      <div class="company-name">Digispark</div>
    </div>

    <div class="divider"></div>

    <!-- Body -->
    <div class="card-body">
      <div class="section-label">Get in Touch</div>
      <div class="contact-list">

        <a class="contact-item" href="mailto:attitude@gmail.com">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <div class="contact-text">
            <span class="contact-label">Email</span>
            <span class="contact-value">attitude@gmail.com</span>
          </div>
        </a>

        <div class="contact-item">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div class="contact-text">
            <span class="contact-label">Address</span>
            <span class="contact-value">Karungal</span>
          </div>
        </div>

        <div class="contact-item">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </div>
          <div class="contact-text">
            <span class="contact-label">Company</span>
            <span class="contact-value">Digispark</span>
          </div>
        </div>

      </div>

      <!-- CTA -->
      <div class="cta">
        <a class="cta-btn" href="mailto:attitude@gmail.com">
          <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Connect with Siva
        </a>
      </div>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      <div class="footer-dot"></div>
      <span class="footer-text">Digispark &nbsp;·&nbsp; Digital Excellence</span>
      <div class="footer-dot"></div>
    </div>

  </div>
</div>

</body>
</html>
